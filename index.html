<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crash In Studio – Digital Art & Clothing</title>
  <link rel="icon" type="image/png" href="./img/logo-crashin-studio.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Leaflet JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { jakarta: ['"Montserrat"', 'sans-serif'] },
          colors: {
            brand: {
              orange: '#f05b29',
              'orange-dark': '#f05b29',
              'orange-light': '#f05b29',
              black: '#111111',
              'gray-soft': '#FFFDF4',
              'gray-border': '#111111',
            }
          },
          animation: {
            'fade-up': 'fadeUp 0.5s ease forwards',
            'slide-down': 'slideDown 0.3s ease forwards',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: 0, transform: 'translateY(20px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            slideDown: {
              '0%': { opacity: 0, transform: 'translateY(-8px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    * {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
    }

    :root {
      --nb-bg: #FFF8DC;
      --nb-paper: #FFFDF4;
      --nb-ink: #111111;
      --nb-pop: #f05b29;
      --nb-pop-2: #5CE1E6;
      --nb-accent: #FF4D9E;
      --nb-shadow: #111111;
    }

    body {
      background-color: var(--nb-bg);
      background-image:
        linear-gradient(0deg, rgba(17, 17, 17, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 17, 17, 0.04) 1px, transparent 1px);
      background-size: 26px 26px;
      color: var(--nb-ink);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--nb-paper); }
    ::-webkit-scrollbar-thumb {
      background: var(--nb-ink);
      border: 1px solid var(--nb-pop);
      border-radius: 0;
    }


    header {
      border-top: 0;
      border-bottom: 0;
      background-color: var(--nb-bg) !important;
      background-image:
        linear-gradient(0deg, rgba(17, 17, 17, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 17, 17, 0.04) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    footer {
      background-color: #111111 !important;
      background-image:
        linear-gradient(0deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    nav {
      border-top: 3px solid var(--nb-ink);
      border-bottom: 3px solid var(--nb-ink) !important;
      box-shadow: 0 6px 0 var(--nb-shadow);
    }

    nav button {
      font-weight: 800 !important;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    nav [x-show="open"] button {
      border: 3px solid var(--nb-ink);
      box-shadow: 4px 4px 0 var(--nb-shadow);
      margin-bottom: 6px;
    }

    /* Nav active */
    .nav-link.active {
      color: var(--nb-ink);
      border-bottom: 3px solid var(--nb-ink);
      background: var(--nb-pop);
    }

    .stripe-accent {
      background: repeating-linear-gradient(
        -45deg,
        var(--nb-pop),
        var(--nb-pop) 10px,
        var(--nb-ink) 10px,
        var(--nb-ink) 20px
      );
    }

    .product-card {
      background: var(--nb-paper);
      border: 3px solid var(--nb-ink) !important;
      box-shadow: 7px 7px 0 var(--nb-shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .product-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 11px 11px 0 var(--nb-shadow);
    }

    .product-card .absolute.top-2.left-2 {
      border: 2px solid var(--nb-ink);
      box-shadow: 3px 3px 0 var(--nb-shadow);
    }

    .product-card .p-3 h3 {
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .product-card .p-3 p {
      color: #2F2F2F;
    }

    .share-icon {
      color: var(--nb-ink) !important;
      border: 2px solid var(--nb-ink);
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      box-shadow: 2px 2px 0 var(--nb-shadow);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background-color 0.12s ease;
    }

    .share-icon:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 var(--nb-shadow);
      background: var(--nb-pop);
    }

    button[class*='bg-brand-orange'] {
      border: 2px solid var(--nb-ink);
      box-shadow: 3px 3px 0 var(--nb-shadow);
      transform: translate(0, 0);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background-color 0.12s ease;
    }

    button[class*='bg-brand-orange']:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--nb-shadow);
    }

    footer .w-10.h-10 {
      border: 3px solid var(--nb-pop);
      box-shadow: 4px 4px 0 var(--nb-shadow);
      background: #111111 !important;
      color: var(--nb-pop) !important;
    }

    footer .w-10.h-10:hover {
      background: #1A1A1A !important;
      color: var(--nb-pop) !important;
      transform: translate(-2px, -2px) scale(1.05) !important;
    }

    /* Badge pulse */
    @keyframes pulse-orange {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240, 91, 41, 0.6); }
      50% { box-shadow: 0 0 0 7px rgba(240, 91, 41, 0); }
    }

    .badge-pulse { animation: pulse-orange 2s infinite; }
  </style>
</head>

<body class="bg-white text-brand-black" x-data="shop()" x-init="init()">

  <!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
  <header class="relative overflow-hidden">

    <!-- decorative orange ring -->
    <div class="absolute -top-16 -right-16 w-64 h-64 rounded-none border-[32px] border-brand-orange opacity-10 pointer-events-none"></div>
    <div class="absolute -bottom-10 -left-10 w-40 h-40 rounded-none border-[20px] border-brand-orange opacity-10 pointer-events-none"></div>

    <div class="relative z-10 max-w-6xl mx-auto px-4 py-8 text-center">

      <!-- Logo -->
      <div class="flex items-center justify-center mb-2">
        <img src="./img/logo-crashin-studio.png" alt="Crash In Studio" class="h-64 w-auto" />
      </div>

      <p class="text-brand-orange text-sm font-medium tracking-widest uppercase mb-1">
        Digital Art &amp; Clothing
      </p>
      <p class="text-gray-700 text-sm max-w-md mx-auto leading-relaxed">
        Ekspresikan dirimu lewat koleksi streetwear eksklusif &amp; karya seni digital yang bold.
      </p>
    </div>

  </header>

  <!-- ═══════════════════════════════ NAV ═══════════════════════════════ -->
  <nav class="sticky top-0 z-50 bg-white border-b border-brand-gray-border shadow-sm" x-data="{ open: false }">
    <div class="max-w-6xl mx-auto px-4">

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center justify-center gap-0 flex-wrap">
        <template x-for="cat in categories" :key="cat.key">
          <button
            @click="activeCategory = cat.key"
            :class="activeCategory === cat.key ? 'text-brand-orange border-b-2 border-brand-orange' : 'text-gray-500 hover:text-brand-orange border-b-2 border-transparent'"
            class="px-5 py-4 text-sm font-semibold whitespace-nowrap transition-colors duration-200"
            x-text="cat.label">
          </button>
        </template>
      </div>

      <!-- Mobile nav toggle -->
      <div class="md:hidden flex items-center justify-between py-3">
        <span class="text-sm font-semibold text-gray-700" x-text="categories.find(c=>c.key===activeCategory)?.label ?? 'Menu'"></span>
        <button @click="open = !open" class="text-brand-orange text-xl">
          <i :class="open ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'"></i>
        </button>
      </div>

      <!-- Mobile dropdown -->
      <div x-show="open" x-transition class="md:hidden pb-3 flex flex-col gap-1">
        <template x-for="cat in categories" :key="cat.key">
          <button
            @click="activeCategory = cat.key; open = false"
            :class="activeCategory === cat.key ? 'bg-brand-orange text-white' : 'text-gray-600 hover:bg-orange-50'"
            class="w-full text-left px-4 py-2.5 rounded-none text-sm font-semibold transition-colors"
            x-text="cat.label">
          </button>
        </template>
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════ MAIN CONTENT ═══════════════════════════════ -->
  <main class="max-w-6xl mx-auto px-4 py-10">

    <!-- Section title -->
    <div class="flex items-center gap-3 mb-6">
      <span class="w-1 h-7 bg-brand-orange rounded-none"></span>
      <h2 class="text-xl font-bold text-brand-black" x-text="categories.find(c=>c.key===activeCategory)?.label ?? 'Produk'"></h2>
      <span class="ml-auto text-xs text-gray-400 font-medium" x-text="filteredProducts.length + ' produk'"></span>
    </div>

    <!-- Product Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" x-show="filteredProducts.length > 0">
      <template x-for="(product, idx) in filteredProducts" :key="product.id">
        <div
          class="product-card bg-white rounded-none border border-brand-gray-border overflow-hidden cursor-pointer group"
          style="animation: fadeUp 0.4s ease forwards; animation-delay: calc(var(--i) * 60ms);"
          :style="`--i: ${idx}`"
          @click="orderWhatsapp(product)">

          <!-- Image -->
          <div class="relative overflow-hidden bg-brand-gray-soft aspect-[4/5]">
            <template x-if="product.image && !imageErrors[product.id]">
              <img
                :src="product.image"
                :alt="product.name"
                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                @error="imageErrors = { ...imageErrors, [product.id]: true }" />
            </template>
            <template x-if="!product.image || imageErrors[product.id]">
              <div class="w-full h-full flex flex-col items-center justify-center gap-1.5 text-brand-orange">
                <i class="fa-regular fa-image text-4xl"></i>
                <span class="text-[10px] font-semibold uppercase tracking-wide">Gambar belum tersedia</span>
              </div>
            </template>

            <!-- Category badge -->
            <span class="absolute top-2 left-2 bg-brand-orange text-white text-[10px] font-bold px-2 py-0.5 rounded-none uppercase tracking-wide">
              <span x-text="categoryLabel(product.category)"></span>
            </span>

            <!-- WA hint on hover -->
            <div class="absolute inset-0 bg-brand-black/70 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <div class="text-center text-white">
                <i class="fa-brands fa-whatsapp text-3xl text-brand-orange mb-1"></i>
                <p class="text-xs font-semibold">Pesan via WhatsApp</p>
              </div>
            </div>
          </div>

          <!-- Info -->
          <div class="p-3" @click.stop>
            <h3 class="text-sm font-bold text-brand-orange line-clamp-1 mb-0.5" x-text="product.name"></h3>
            <p class="text-xs text-gray-400 line-clamp-2 mb-2 leading-relaxed" x-text="product.description"></p>

            <!-- Price -->
            <p class="text-base font-extrabold text-brand-orange mb-3" x-text="formatPrice(product.price)"></p>

            <!-- Bottom row: share icons + order -->
            <div class="flex items-center justify-between">

              <!-- Share icons -->
              <div class="flex items-center gap-2">
                <!-- Facebook -->
                <a :href="shareFacebook(product)" target="_blank" rel="noopener"
                   class="share-icon text-gray-300 hover:text-blue-600 text-sm" title="Bagikan ke Facebook"
                   @click.stop>
                  <i class="fa-brands fa-facebook-f"></i>
                </a>
                <!-- WhatsApp -->
                <a :href="shareWhatsapp(product)" target="_blank" rel="noopener"
                   class="share-icon text-gray-300 hover:text-green-500 text-sm" title="Bagikan ke WhatsApp"
                   @click.stop>
                  <i class="fa-brands fa-whatsapp"></i>
                </a>
                <!-- X/Twitter -->
                <a :href="shareX(product)" target="_blank" rel="noopener"
                   class="share-icon text-gray-300 hover:text-black text-sm" title="Bagikan ke X"
                   @click.stop>
                  <i class="fa-brands fa-x-twitter"></i>
                </a>
                <!-- Copy link -->
                <button
                  class="share-icon text-gray-300 hover:text-brand-orange text-sm relative" title="Salin tautan"
                  @click.stop="copyLink(product)">
                  <i class="fa-solid fa-link"></i>
                  <span
                    x-show="copiedId === product.id"
                    x-transition
                    class="absolute -top-6 left-1/2 -translate-x-1/2 bg-brand-black text-white text-[10px] px-2 py-0.5 rounded-none whitespace-nowrap pointer-events-none">
                    Disalin!
                  </span>
                </button>
              </div>

              <!-- Order button -->
              <button
                @click.stop="orderWhatsapp(product)"
                class="flex items-center gap-1 bg-brand-orange hover:bg-brand-orange-dark text-white text-[10px] font-bold px-2.5 py-1.5 rounded-none transition-colors">
                <i class="fa-brands fa-whatsapp text-xs"></i>
                Pesan
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Empty state -->
    <div x-show="filteredProducts.length === 0" class="text-center py-20">
      <i class="fa-solid fa-box-open text-5xl text-brand-orange-light mb-4"></i>
      <p class="text-gray-400 font-semibold">Belum ada produk di kategori ini.</p>
    </div>
  </main>

  <!-- ═══════════════════════════════ FOOTER ═══════════════════════════════ -->
  <footer class="bg-brand-black mt-16">

    <div class="max-w-6xl mx-auto px-4 py-10 text-center">

      <!-- Brand -->
      <div class="flex items-center justify-center mb-3">
        <img src="./img/logo-crashin-studio.png" alt="Crash In Studio" class="h-20 w-auto" />
      </div>

      <p class="text-gray-500 text-xs mb-6 max-w-xs mx-auto">Digital Art & Clothing – Bold by design.</p>

      <!-- Social Links -->
      <div class="flex items-center justify-center gap-5 mb-8">
        <a href="#" target="_blank" rel="noopener"
           class="w-10 h-10 rounded-none bg-white/5 hover:bg-brand-orange flex items-center justify-center text-gray-400 hover:text-white transition-all duration-200 hover:scale-110"
           title="Instagram">
          <i class="fa-brands fa-instagram text-lg"></i>
        </a>
        <a href="#" target="_blank" rel="noopener"
           class="w-10 h-10 rounded-none bg-white/5 hover:bg-brand-orange flex items-center justify-center text-gray-400 hover:text-white transition-all duration-200 hover:scale-110"
           title="GitHub">
          <i class="fa-brands fa-github text-lg"></i>
        </a>
        <a href="#" target="_blank" rel="noopener"
           class="w-10 h-10 rounded-none bg-white/5 hover:bg-brand-orange flex items-center justify-center text-gray-400 hover:text-white transition-all duration-200 hover:scale-110"
           title="YouTube">
          <i class="fa-brands fa-youtube text-lg"></i>
        </a>
      </div>

      <!-- Divider -->
      <div class="pt-6">
        <p class="text-gray-500 text-xs">
          &copy; <span x-text="new Date().getFullYear()"></span> Crash In Studio. All rights reserved.
        </p>
        <p class="text-gray-600 text-xs mt-1">
          Powered by
          <a href="https://nokensoft.com" target="_blank" rel="noopener"
             class="text-brand-orange hover:underline font-semibold">Nokensoft.com</a>
        </p>
      </div>
    </div>
  </footer>

  <script>
    (() => {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const audioContext = new AudioContextClass();
      let lastPlayedAt = 0;

      const unlockAudio = () => {
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
      };

      window.addEventListener('pointerdown', unlockAudio, { once: true });
      window.addEventListener('keydown', unlockAudio, { once: true });

      const playHoverSound = () => {
        const now = performance.now();
        if (now - lastPlayedAt < 80) return;
        lastPlayedAt = now;

        unlockAudio();

        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const startTime = audioContext.currentTime;

        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(920, startTime);
        oscillator.frequency.exponentialRampToValueAtTime(700, startTime + 0.07);

        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.05, startTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.1);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(startTime);
        oscillator.stop(startTime + 0.11);
      };

      document.addEventListener('pointerover', (event) => {
        const hoveredLink = event.target.closest('a');
        if (!hoveredLink) return;
        playHoverSound();
      });
    })();
  </script>

  <!-- ═══════════════════════════════ ALPINE JS APP ═══════════════════════════════ -->
  <script>
    function shop() {
      return {
        // ── Config ──────────────────────────────────────────────────────────
        waNumber: '6281390057997',
        baseUrl: window.location.origin + window.location.pathname,

        // ── State ───────────────────────────────────────────────────────────
        activeCategory: 'all',
        copiedId: null,
        imageErrors: {},

        // ── Categories ──────────────────────────────────────────────────────
        categories: [
          { key: 'all', label: 'Home' },
        ],
        // ── Products ────────────────────────────────────────────────────────
        products: [],

        // ── Computed ─────────────────────────────────────────────────────────
        get filteredProducts() {
          if (this.activeCategory === 'all') return this.products;
          return this.products.filter(p => p.category === this.activeCategory);
        },

        // ── Helpers ──────────────────────────────────────────────────────────
        formatPrice(price) {
          return 'Rp ' + price.toLocaleString('id-ID');
        },
        categoryLabel(categoryKey) {
          return this.categories.find(c => c.key === categoryKey)?.label ?? categoryKey;
        },

        productUrl(product) {
          return `${this.baseUrl}?product=${product.id}`;
        },
        normalizePhone(phone) {
          const digitsOnly = String(phone ?? '').replace(/\D/g, '');
          if (!digitsOnly) return this.waNumber;
          if (digitsOnly.startsWith('0')) return '62' + digitsOnly.slice(1);
          return digitsOnly;
        },
        async loadData() {
          try {
            const response = await fetch('data.json', { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();

            if (Array.isArray(data.categories) && data.categories.length) {
              this.categories = data.categories;
            }

            if (Array.isArray(data.products)) {
              this.products = data.products.map(product => ({
                ...product,
                image: product.image ?? '',
                phone: product.phone ?? data?.whatsapp?.phoneDisplay ?? '+62 813-9005-7997',
              }));
            }

            const waFromJson = data?.whatsapp?.phoneWa ?? data?.whatsapp?.phoneDisplay;
            if (waFromJson) {
              this.waNumber = this.normalizePhone(waFromJson);
            }

            if (!this.categories.some(c => c.key === this.activeCategory)) {
              this.activeCategory = this.categories[0]?.key ?? 'all';
            }
          } catch (error) {
            console.error('Gagal memuat data.json:', error);
          }
        },

        // ── Share URLs ────────────────────────────────────────────────────────
        shareFacebook(product) {
          const url = encodeURIComponent(this.productUrl(product));
          return `https://www.facebook.com/sharer/sharer.php?u=${url}`;
        },
        shareWhatsapp(product) {
          const text = encodeURIComponent(`Cek produk ini dari Crash In Studio: *${product.name}* - ${this.formatPrice(product.price)}\n${this.productUrl(product)}`);
          return `https://wa.me/?text=${text}`;
        },
        shareX(product) {
          const text = encodeURIComponent(`${product.name} - ${this.formatPrice(product.price)} @CrashInStudio`);
          const url = encodeURIComponent(this.productUrl(product));
          return `https://x.com/intent/tweet?text=${text}&url=${url}`;
        },

        copyLink(product) {
          navigator.clipboard.writeText(this.productUrl(product)).then(() => {
            this.copiedId = product.id;
            setTimeout(() => this.copiedId = null, 2000);
          });
        },

        // ── Order via WhatsApp ────────────────────────────────────────────────
        orderWhatsapp(product) {
          const targetPhone = this.normalizePhone(product.phone ?? this.waNumber);
          const msg = encodeURIComponent(
            `Halo Crash In Studio!\n\nSaya ingin memesan produk berikut:\n- Nama: ${product.name}\n- Kategori: ${this.categoryLabel(product.category)}\n- Harga: ${this.formatPrice(product.price)}\n- Deskripsi: ${product.description}\n- Link: ${this.productUrl(product)}\n\nMohon info stok, ukuran, dan cara pembayaran. Terima kasih.`
          );
          window.open(`https://wa.me/${targetPhone}?text=${msg}`, '_blank');
        },

        // ── Init ─────────────────────────────────────────────────────────────
        async init() {
          await this.loadData();
          // Baca param produk dari URL jika ada
          const params = new URLSearchParams(window.location.search);
          const pid = params.get('product');
          if (pid) {
            const found = this.products.find(p => p.id === parseInt(pid));
            if (found) {
              this.activeCategory = found.category;
            }
          }
        },
      }
    }
  </script>
</body>
</html>
